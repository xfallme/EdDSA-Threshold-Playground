<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>EdDSA Playground</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2026.6.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2026.6.1/core.js"></script>
</head>

<h1>🔐 EdDSA Playground</h1>

<p>
    Interactively generate keys, sign messages, and verify signatures using your
    Python implementation running directly in the browser.
</p>

<div>

    <h2>Message</h2>

    <textarea id="message">Hello, EdDSA!</textarea>
    
    <button id="generate-button">
        Generate Keypair
    </button>

    <button id="sign-button">
        Sign Message
    </button>

    <button id="verify-button">
        Verify Signature
    </button>

</div>

<div>

    <h2>Output</h2>

    <pre id="output">
        Ready.
    </pre>

</div>

<script type="py" src="./playground-eddsa.py" config="./pyscript.json"></script>

</body>

</html>
