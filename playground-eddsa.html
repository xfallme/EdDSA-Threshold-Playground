<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <title>EdDSA Playground</title>

    <link rel="stylesheet" href="https://pyscript.net/releases/2026.6.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2026.6.1/core.js"></script>

    <link rel="stylesheet" href="./playground.css" />
</head>

<body>
    <header>

        <h1>🔐 EdDSA Playground</h1>

        <select id="algorithm">
            <option value="ed25519">Ed25519</option>
            <option value="ed448">Ed448</option>
        </select>

    </header>

    <nav class="tabs">

        <button class="tab-button active" data-tab="keygen">
            Key Generation
        </button>

        <button class="tab-button" data-tab="sign">
            Signing
        </button>

        <button class="tab-button" data-tab="verify">
            Verification
        </button>

    </nav>

    <section id="keygen" class="tab">

        <div class="card">

            <h2>Key Generation</h2>

            <div class="form-group">
                <label for="keygen-output-format">Output Format</label>
                <select id="keygen-output-format">
                    <option value="hex">Hex</option>
                    <option value="base64">Base64</option>
                    <option value="python">Python Byte String (b'...')</option>
                </select>
            </div>

            <div class="button-row">
                <button id="generate-keypair-button">Generate Keypair</button>
                <button id="clear-keypair-button" type="button">Clear</button>
            </div>

        </div>

        <div class="card">

            <div class="form-group">
                <label id="private-key-output-label" for="private-key-output">Private Key</label>
                <textarea label="Private Key" id="private-key-output" rows="3" disabled spellcheck="false" placeholder="Private key will appear here..."></textarea>
            </div>

            <div class="form-group">
                <label id="public-key-output-label" for="public-key-output">Public Key</label>
                <textarea id="public-key-output" rows="3" disabled spellcheck="false" placeholder="Public key will appear here..."></textarea>
            </div>

        </div>

    </section>

    <section id="sign" class="tab" hidden>
        <h2>Signing</h2>
    </section>

    <section id="verify" class="tab" hidden>
        <h2>Verification</h2>
    </section>

    <script type="py" src="./playground-eddsa.py" config="./pyscript.json"></script>

    <script>
        const buttons = document.querySelectorAll(".tab-button");
        const tabs = document.querySelectorAll(".tab");

        buttons.forEach(button => {
            button.onclick = () => {
                tabs.forEach(tab => tab.hidden = true);
                buttons.forEach(btn => btn.classList.remove("active"));

                document.getElementById(button.dataset.tab).hidden = false;
                button.classList.add("active");
            };
        });
    </script>

</body>

</html>
