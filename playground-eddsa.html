<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <title>EdDSA Playground</title>

    <link rel="stylesheet" href="https://pyscript.net/releases/2026.6.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2026.6.1/core.js"></script>

    <link rel="stylesheet" href="./playground.css" />
</head>

<body>
    <header>

        <h1 style="text-align: center">🔐 EdDSA Playground</h1>

        <select id="algorithm">
            <option value="ed25519">Ed25519</option>
            <option value="ed25519ph">Ed25519 Prehash</option>
            <option value="ed25519ctx">Ed25519 Context</option>
            <option value="ed448">Ed448</option>
            <option value="ed448ph">Ed448 Prehash</option>
        </select>

    </header>

    <nav class="tabs">
        <button class="tab-button active" data-tab="keygen">Key Generation</button>
        <button class="tab-button" data-tab="sign">Signing</button>
        <button class="tab-button" data-tab="verify">Verification</button>
    </nav>

    <section id="keygen" class="tab">
        <div class="card">
            <h2>Key Generation</h2>

            <div class="form-group">
                <label for="keygen-output-format">Output Format</label>
                <select id="keygen-output-format">
                    <option value="hex">Hex</option>
                    <option value="base64">Base64</option>
                    <option value="python">Python Byte String (b'...')</option>
                </select>
            </div>

            <div class="button-row">
                <button id="generate-keypair-button" class="primary">Generate Keypair</button>
                <button id="clear-keypair-button">Clear</button>
            </div>
        </div>

        <div class="card">
            <h2>From Private Key</h2>

            <div class="form-group">
                <label for="keygen-existing-private-key-format">Output Format</label>
                <select id="keygen-existing-private-key-format">
                    <option value="hex">Hex</option>
                    <option value="base64">Base64</option>
                    <option value="python">Python Byte String (b'...')</option>
                </select>

                <label id="keygen-existing-private-key-label" for="keygen-existing-private-key">Private Key</label>
                <textarea id="keygen-existing-private-key" rows="3" spellcheck="false"
                    placeholder="Enter private key..."></textarea>
            </div>

            <div class="button-row">
                <button id="existing-keypair-button" class="primary">Derive Keypair</button>
                <button id="clear-existing-keypair-button">Clear</button>
            </div>
        </div>

        <div class="card">
            <div class="form-group">
                <label id="private-key-output-label" for="private-key-output">Private Key</label>
                <textarea label="Private Key" id="private-key-output" rows="3" disabled spellcheck="false"
                    placeholder="Private key will appear here..."></textarea>
                <button class="copy-button" data-copy-target="private-key-output">📋 Copy</button>

                <label id="public-key-output-label" for="public-key-output">Public Key</label>
                <textarea id="public-key-output" rows="3" disabled spellcheck="false"
                    placeholder="Public key will appear here..."></textarea>
                <button class="copy-button" data-copy-target="public-key-output">📋 Copy</button>
            </div>
            <div id="keygen-status" class="status-box success" hidden></div>
        </div>
    </section>

    <section id="sign" class="tab" hidden>
        <div class="card">
            <h2>Signing</h2>

            <div class="form-group">
                <label for="sign-use-existing-key">Use Existing Key from the Key Generation Tab</label>
                <input type="checkbox" id="sign-use-existing-key" checked />
            </div>

            <div id="sign-private-key-section" class="form-group">
                <label for="sign-private-key-format">Private Key Format</label>
                <select id="sign-private-key-format">
                    <option value="hex">Hex</option>
                    <option value="base64">Base64</option>
                    <option value="python">Python Byte String (b'...')</option>
                </select>

                <label id="sign-private-key-label" for="sign-private-key">Private Key</label>
                <textarea id="sign-private-key" rows="3" spellcheck="false"
                    placeholder="Enter private key..."></textarea>
            </div>

            <div class="form-group">
                <label for="sign-message-format">Message Format</label>
                <select id="sign-message-format">
                    <option value="text">Text</option>
                    <option value="hex">Hex</option>
                    <option value="base64">Base64</option>
                    <option value="python">Python Byte String (b'...')</option>
                </select>

                <label for="sign-message">Message</label>
                <textarea id="sign-message" rows="5" spellcheck="false"
                    placeholder="Enter message to sign..."></textarea>
            </div>

            <div id="sign-context-section" class="form-group">
                <label for="sign-context-format">Context Format</label>
                <select id="sign-context-format">
                    <option value="text">Text</option>
                    <option value="hex">Hex</option>
                    <option value="base64">Base64</option>
                    <option value="python">Python Byte String (b'...')</option>
                </select>

                <label for="sign-context">Context</label>
                <textarea id="sign-context" rows="5" spellcheck="false" placeholder="Enter context..."></textarea>
            </div>

            <div class="form-group">
                <label for="sign-signature-output-format">Signature Format</label>
                <select id="sign-signature-output-format">
                    <option value="hex">Hex</option>
                    <option value="base64">Base64</option>
                    <option value="python">Python Byte String (b'...')</option>
                </select>
            </div>

            <div class="button-row">
                <button id="sign-button" class="primary">Sign</button>
                <button id="clear-sign-button">Clear</button>
            </div>
        </div>

        <div class="card">
            <div class="form-group">
                <label for="sign-signature-output">Signature</label>
                <textarea id="sign-signature-output" rows="3" disabled spellcheck="false"
                    placeholder="Signature will appear here..."></textarea>
                <button class="copy-button" data-copy-target="sign-signature-output">📋 Copy</button>
            </div>
            <div id="sign-status" class="status-box success" hidden></div>
        </div>
    </section>

    <section id="verify" class="tab" hidden>
        <div class="card">
            <h2>Verification</h2>

            <div class="form-group">
                <label for="verify-use-existing-key">Use Existing Key from the Key Generation Tab</label>
                <input type="checkbox" id="verify-use-existing-key" />
            </div>

            <div id="verify-public-key-section" class="form-group">
                <label for="verify-public-key-format">Public Key Format</label>
                <select id="verify-public-key-format">
                    <option value="hex">Hex</option>
                    <option value="base64">Base64</option>
                    <option value="python">Python Byte String</option>
                </select>

                <label id="verify-public-key-label" for="verify-public-key">Public Key</label>
                <textarea id="verify-public-key" rows="3" spellcheck="false"
                    placeholder="Enter public key..."></textarea>
            </div>

            <div class="form-group">
                <label for="verify-message-format">Message Format</label>
                <select id="verify-message-format">
                    <option value="text">Text</option>
                    <option value="hex">Hex</option>
                    <option value="base64">Base64</option>
                    <option value="python">Python Byte String</option>
                </select>

                <label for="verify-message">Message</label>
                <textarea id="verify-message" rows="5" spellcheck="false"
                    placeholder="Enter message to verify..."></textarea>
            </div>

            <div id="verify-context-section" class="form-group">
                <label for="verify-context-format">Context Format</label>
                <select id="verify-context-format">
                    <option value="text">Text</option>
                    <option value="hex">Hex</option>
                    <option value="base64">Base64</option>
                    <option value="python">Python Byte String (b'...')</option>
                </select>

                <label for="verify-context">Context</label>
                <textarea id="verify-context" rows="5" spellcheck="false" placeholder="Enter context..."></textarea>
            </div>

            <div class="form-group">
                <label for="verify-signature-format">Signature Format</label>
                <select id="verify-signature-format">
                    <option value="hex">Hex</option>
                    <option value="base64">Base64</option>
                    <option value="python">Python Byte String</option>
                </select>

                <label id="verify-signature-label" for="verify-signature">Signature</label>
                <textarea id="verify-signature" rows="3" spellcheck="false"
                    placeholder="Enter signature to verify..."></textarea>
            </div>

            <div class="button-row">
                <button id="verify-button" class="primary">Verify</button>
                <button id="clear-verify-button">Clear</button>
            </div>
        </div>

        <div id="verify-status" class="status-box success" hidden></div>
    </section>

    <script type="py" src="./playground-eddsa.py" config="./pyscript.json"></script>

    <script>
        // Tab switching logic
        const buttons = document.querySelectorAll(".tab-button");
        const tabs = document.querySelectorAll(".tab");

        buttons.forEach(button => {
            button.onclick = () => {
                tabs.forEach(tab => tab.hidden = true);
                buttons.forEach(btn => btn.classList.remove("active"));

                document.getElementById(button.dataset.tab).hidden = false;
                button.classList.add("active");
            };
        });

        // Show/hide private key section based on checkbox
        const signUseExistingKeyCheckbox = document.getElementById("sign-use-existing-key");
        const signPrivateKeySection = document.getElementById("sign-private-key-section");

        signUseExistingKeyCheckbox.addEventListener("change", () => {
            const useExistingKey = signUseExistingKeyCheckbox.checked;
            if (useExistingKey) {
                signPrivateKeySection.style.display = "none";
            } else {
                signPrivateKeySection.style.display = "flex";
            }
        });

        const verifyUseExistingKeyCheckbox = document.getElementById("verify-use-existing-key");
        const verifyPublicKeySection = document.getElementById("verify-public-key-section");

        verifyUseExistingKeyCheckbox.addEventListener("change", () => {
            const useExistingKey = verifyUseExistingKeyCheckbox.checked;
            if (useExistingKey) {
                verifyPublicKeySection.style.display = "none";
            } else {
                verifyPublicKeySection.style.display = "flex";
            }
        });

        // Show/hide context section based on selected algorithm
        const selectedAlgorithm = document.getElementById("algorithm");

        function updateVisibility(algorithm) {
            if (algorithm === "ed25519" || algorithm === "ed25519ph") {
                document.getElementById("sign-context-section").style.display = "none";
                document.getElementById("verify-context-section").style.display = "none";
            } else {
                document.getElementById("sign-context-section").style.display = "flex";
                document.getElementById("verify-context-section").style.display = "flex";
            }
        }

        updateVisibility(selectedAlgorithm.value);
        selectedAlgorithm.addEventListener("change", () => {
            updateVisibility(selectedAlgorithm.value);
        });

        // Update labels based on selected algorithm and run it once on page load
        function updateLabels(algorithm) {
            const privateKeyLabelKeygen = document.getElementById("private-key-output-label");
            const publicKeyLabelKeygen = document.getElementById("public-key-output-label");
            const privateKeyLabelSign = document.getElementById("sign-private-key-label");
            const publicKeyLabelVerify = document.getElementById("verify-public-key-label");
            const signatureLabelVerify = document.getElementById("verify-signature-label");

            if (algorithm.startsWith("ed25519")) {
                privateKeyLabelKeygen.textContent = "Private Key (32 bytes)";
                publicKeyLabelKeygen.textContent = "Public Key (32 bytes)";
                privateKeyLabelSign.textContent = "Private Key (32 bytes)";
                publicKeyLabelVerify.textContent = "Public Key (32 bytes)";
                signatureLabelVerify.textContent = "Signature (64 bytes)";
            } else if (algorithm.startsWith("ed448")) {
                privateKeyLabelKeygen.textContent = "Private Key (57 bytes)";
                publicKeyLabelKeygen.textContent = "Public Key (57 bytes)";
                privateKeyLabelSign.textContent = "Private Key (57 bytes)";
                publicKeyLabelVerify.textContent = "Public Key (57 bytes)";
                signatureLabelVerify.textContent = "Signature (114 bytes)";
            }
        }

        updateLabels(selectedAlgorithm.value);
        selectedAlgorithm.addEventListener("change", () => {
            updateLabels(selectedAlgorithm.value);
        });

        // Copy to clipboard functionality
        document.querySelectorAll(".copy-button").forEach(button => {
            button.onclick = async () => {
                const target = document.getElementById(button.dataset.copyTarget);
                await navigator.clipboard.writeText(target.value);
                const oldText = button.textContent;
                button.textContent = "✓ Copied!";
                setTimeout(() => {
                    button.textContent = oldText;
                }, 1500);
            };
        });
    </script>

</body>

</html>
