<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <title>FROST Playground</title>

    <link rel="stylesheet" href="https://pyscript.net/releases/2026.6.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2026.6.1/core.js"></script>

    <link rel="stylesheet" href="./playground.css" />
</head>

<body>
    <header class="hero">
        <h1>👥 FROST Playground</h1>

        <p class="hero-subtitle">
            Generate group secrets, sign, and verify messages using <strong>Ed25519</strong> and <strong>Ed448</strong>
            in a
            Multi-Party Setting.
        </p>

        <div class="hero-controls">
            <label for="algorithm">Algorithm</label>
            <select id="algorithm">
                <option value="ed25519">Ed25519</option>
                <option value="ed448">Ed448</option>
            </select>
        </div>
    </header>

    <nav class="tabs">
        <button class="tab-button active" data-tab="dealer"> Trusted Dealer</button>
        <button class="tab-button" data-tab="coordinator">Coordinator</button>
        <button class="tab-button" data-tab="participants">Participants</button>
        <button class="tab-button" data-tab="verify">Verification (Normal EdDSA)</button>
    </nav>

    <section id="dealer" class="tab">
        <div class="card">
            <h2>Threshold Parameters</h2>

            <div class="form-group format-row">
                <label for="participant-count">Participants</label>
                <input id="participant-count" type="number" min="1" value="3">

                <label for="threshold">Threshold</label>
                <input id="threshold" type="number" min="1" value="2">
            </div>

            <div class="form-group">
                <div class="inline-field">
                    <label for="dealer-use-existing-secret">Generate random group secret</label>
                    <input type="checkbox" id="dealer-use-existing-secret" checked />
                </div>
            </div>

            <div id="dealer-existing-secret-section" class="form-group" style="display: none;">
                <div class="inline-field">
                    <label for="dealer-existing-secret-format">Secret Format</label>
                    <select id="dealer-existing-secret-format">
                        <option value="hex">Hex</option>
                        <option value="base64">Base64</option>
                        <option value="python">Python Byte String (b'...')</option>
                    </select>
                </div>
                <label id="dealer-existing-secret-label" for="dealer-existing-secret">Group Secret</label>
                <textarea id="dealer-existing-secret" rows="3" spellcheck="false"
                    placeholder="Enter group secret..."></textarea>
            </div>

            <div class="button-row">
                <button id="dealer-generate-button" class="primary">Generate Shares</button>
                <button id="dealer-clear-button">Clear Inputs</button>
                <button id="dealer-clear-all-button" class="danger">Clear All</button>
            </div>
        </div>

        <div class="card">
            <h2>Group Information</h2>

            <div class="form-group">
                <label id="group-public-key-label" for="group-public-key">Group Public Key</label>
                <textarea id="group-public-key" rows="3" disabled
                    placeholder="Group public key will appear here..."></textarea>
                <button class="copy-button" data-copy-target="group-public-key">📋 Copy</button>
            </div>

            <div id="dealer-status" class="status-box info" hidden></div>
        </div>
    </section>

    <section id="coordinator" class="tab" hidden>
        <div class="card">
            <h2>Create Signing Session</h2>
            <div class="form-group">
                <div class="inline-field">
                    <label for="coordinator-message-format">Message Format</label>
                    <select id="coordinator-message-format">
                        <option value="text">Text</option>
                        <option value="hex">Hex</option>
                        <option value="base64">Base64</option>
                        <option value="python">Python Byte String (b'...')</option>
                    </select>
                </div>

                <label for="coordinator-message">Message</label>
                <textarea id="coordinator-message" rows="4" spellcheck="false"
                    placeholder="Enter message..."></textarea>
            </div>

            <div class="button-row">
                <button id="coordinator-create-package-button" class="primary">Create Signing Session</button>
                <button id="coordinator-clear-button">Clear Input</button>
            </div>
        </div>

        <div id="coordinator-sessions-container"></div>

        <template id="coordinator-session-template">
            <details class="card session-card">
                <summary>
                    <span class="session-title">
                        Signing Session {session_id}
                    </span>
                </summary>

                <div class="form-group">
                    <label for="coordinator-session-id-{short_id}">Session ID</label>
                    <textarea id="coordinator-session-id-{short_id}" rows="1" disabled spellcheck="false"
                        placeholder="Session ID will appear here..."></textarea>
                    <button class="copy-button" data-copy-target="coordinator-session-id-{short_id}">📋 Copy</button>
                </div>

                <div class="form-group">
                    <label for="coordinator-session-message-{short_id}">Message</label>
                    <textarea id="coordinator-session-message-{short_id}" rows="1" disabled spellcheck="false"
                        placeholder="Message will appear here..."></textarea>
                    <button class="copy-button" data-copy-target="coordinator-session-message-{short_id}">📋
                        Copy</button>
                </div>

                <div class="form-group">
                    <label for="coordinator-session-participant-ids-{short_id}">Participant IDs</label>
                    <textarea id="coordinator-session-participant-ids-{short_id}" rows="1" disabled spellcheck="false"
                        placeholder="Participant IDs will appear here..."></textarea>
                    <button class="copy-button" data-copy-target="coordinator-session-participant-ids-{short_id}">📋
                        Copy</button>
                </div>

                <details class="form-group">
                    <summary>Commitments</summary>
                    <div class="form-group">
                        <textarea id="coordinator-session-commitments-{short_id}" rows="1" disabled spellcheck="false"
                            placeholder="Commitments..."></textarea>
                        <button class="copy-button" data-copy-target="coordinator-session-commitments-{short_id}">📋
                            Copy</button>
                    </div>
                </details>

                <details class="form-group">
                    <summary>Signature Shares</summary>
                    <div class="form-group">
                        <textarea id="coordinator-session-signature-shares-{short_id}" rows="1" disabled
                            spellcheck="false" placeholder="Signature Shares..."></textarea>
                        <button class="copy-button"
                            data-copy-target="coordinator-session-signature-shares-{short_id}">📋
                            Copy</button>
                    </div>
                </details>

                <hr>

                <div class="session-state">
                    <span id="coordinator-session-signing-in-progress-{short_id}" class="state-badge">Signing</span>
                    <span id="coordinator-session-round-one-completed-{short_id}" class="state-badge">Round 1</span>
                    <span id="coordinator-session-round-two-completed-{short_id}" class="state-badge">Round 2</span>
                    <span id="coordinator-session-completed-{short_id}" class="state-badge">Complete</span>
                </div>

                <div class="form-group">
                    <div class="inline-field">
                        <label for="coordinator-signature-format">Output Format</label>
                        <select id="coordinator-signature-format">
                            <option value="hex">Hex</option>
                            <option value="base64">Base64</option>
                            <option value="python">Python Byte String (b'...')</option>
                        </select>
                        <button id="coordinator-aggregate-button" class="primary">Aggregate</button>
                    </div>

                    <label for="coordinator-session-signature-{short_id}">Signature</label>
                    <textarea id="coordinator-session-signature-{short_id}" rows="1" disabled spellcheck="false"
                        placeholder="Signature will appear here..."></textarea>
                    <button class="copy-button" data-copy-target="coordinator-session-signature-{short_id}">📋
                        Copy</button>
                </div>

                <div id="coordinator-session-status-{short_id}" class="status-box info" hidden></div>
            </details>
        </template>

        <div id="coordinator-status" class="status-box info" hidden></div>
    </section>

    <section id="participants" class="tab" hidden></section>

    <section id="verify" class="tab" hidden></section>

    <script type="py" src="./playground-frost.py" config="./pyscript.json"></script>

    <script src="./util.js"></script>
    <script>
        // Show/hide private key section based on checkbox
        const dealerUseExistingSecretCheckbox = document.getElementById("dealer-use-existing-secret");
        const dealerExistingSecretSection = document.getElementById("dealer-existing-secret-section");

        dealerUseExistingSecretCheckbox.addEventListener("change", () => {
            const useExistingSecret = dealerUseExistingSecretCheckbox.checked;
            if (useExistingSecret) {
                dealerExistingSecretSection.style.display = "none";
            } else {
                dealerExistingSecretSection.style.display = "flex";
            }
        });

        // Update labels based on selected algorithm and run it once on page load
        const selectedAlgorithm = document.getElementById("algorithm");

        function updateLabels(algorithm) {
            const groupPublicKeyLabel = document.getElementById("group-public-key-label");

            if (algorithm === "ed25519") {
                groupPublicKeyLabel.textContent = "Group Public Key (32 bytes)";
            } else if (algorithm === "ed448") {
                groupPublicKeyLabel.textContent = "Group Public Key (57 bytes)";
            }
        }

        updateLabels(selectedAlgorithm.value);
        selectedAlgorithm.addEventListener("change", () => {
            updateLabels(selectedAlgorithm.value);
        });
    </script>

</body>

</html>
